name: Update Kobo registry data

on:
  workflow_dispatch:
  schedule:
    # Runs every 30 minutes. Adjust if needed.
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch Kobo data and rebuild registry files
        env:
          KOBO_API_TOKEN: ${{ secrets.KOBO_API_TOKEN }}
          KOBO_API_URL: https://kobo.unocha.org/api/v2/assets/aTX9v7VgZdAbYfKozHV4dN/data/?format=json
        run: python scripts/fetch_kobo.py

      - name: Commit updated data files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update assessment registry data from Kobo"
          file_pattern: data/registry.json data/registry.js
